apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Frontend Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Setup Node.js
        uses: docker://node:20-alpine
        run: |
          node --version
          npm --version

      - name: Install dependencies
        uses: docker://node:20-alpine
        run: |
          npm ci

      - name: Build application
        uses: docker://node:20-alpine
        run: |
          npm run build
          echo "Frontend built successfully"

  test:
    needs: build
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Install dependencies
        uses: docker://node:20-alpine
        run: |
          npm ci

      - name: Run unit tests
        uses: docker://node:20-alpine
        run: |
          npm test

  docker:
    needs: test
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Build Docker image
        uses: docker://docker:24-alpine
        run: |
          echo "Docker image build would happen here"
